# CI (Mission §12, Phase H): Lint, Typecheck, Golden-Set, Lighthouse-Budgets §2.1.
# Hinweis: Das Repo hat aktuell KEIN Git-Remote — dieser Workflow greift erst
# nach dem ersten Push zu GitHub (siehe WARTELISTE.md).
name: ci

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Golden-Set (offline, deterministisch)
        run: npm run ci:golden-set

      - name: Lighthouse-Budgets (Perf ≥90, SEO ≥95, A11y ≥90, JS ≤30 KB)
        run: npm run ci:lighthouse

      - name: Lighthouse-Reports als Artefakt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouse/reports
          if-no-files-found: ignore
